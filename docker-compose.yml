services:
  # ─────────────────────────────────────────
  # SYMFONY + API PLATFORM – nt-api.maxime-ai.com
  # FrankenPHP = PHP + serveur HTTP natif, 1 seul conteneur
  # NPM forward directement : nt-api.maxime-ai.com → symfony:80
  # ─────────────────────────────────────────
  nt-symfony:
    container_name: nt-symfony
    build:
      context: ./docker/symfony
    restart: unless-stopped
    ports:
     - "8888:80"
    volumes:
      - ./projects/api:/app
    environment:
      - APP_ENV=${SYMFONY_APP_ENV}
      - APP_SECRET=${SYMFONY_APP_SECRET}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?serverVersion=${POSTGRES_VERSION}&charset=utf8
      - CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN:-^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$}
      - SERVER_NAME=:80
      - TRUSTED_PROXIES=127.0.0.1,REMOTE_ADDR
      - TRUSTED_HOSTS=nt-api\.maxime-ai\.com,localhost
      - MERCURE_PUBLISHER_JWT_KEY=${CADDY_MERCURE_JWT_SECRET}
      - MERCURE_SUBSCRIKEY_JWT_KEY=${CADDY_MERCURE_JWT_SECRET}
      - MERCURE_URL=${CADDY_MERCURE_URL}
      - MERCURE_PUBLIC_URL=${CADDY_MERCURE_PUBLIC_URL}
      - MERCURE_JWT_SECRET=${CADDY_MERCURE_JWT_SECRET}
    depends_on:
       nt-postgres:
        condition: service_healthy
    networks:
      - ai_network

  nt-tanstack:
    container_name: nt-tanstack
    build:
      context: ./projects/frontend
      dockerfile: ../../docker/tanstack/Dockerfile
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      - PORT=3010
      - NODE_ENV=production
      - VITE_API_URL=https://nt-api.maxime-ai.com
    depends_on:
      nt-symfony:
        condition: service_healthy
    networks:
      - ai_network

  nt-postgres:
    image: postgres:${POSTGRES_VERSION}-alpine
    container_name: nt-postgres
    restart: unless-stopped
    ports:
     - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai_network
      
volumes:
  postgres_data:

networks:
  ai_network:
    external: true
